name: Customizado Jekyll

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main # O branch main contem o codigo-fonte do site.

  workflow_dispatch: # Permite execução manual (Actions > Run workflow)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  jekyll:
    if: github.ref == 'refs/heads/main' # Segurança extra
    runs-on: ubuntu-latest
    outputs:
      has_posts: ${{ steps.posts.outputs.has_posts }}
      post_count: ${{ steps.posts.outputs.post_count }}
      posts_json: ${{ steps.posts.outputs.posts_json }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.7'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Cache Ruby dependencies
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ruby-${{ runner.os }}-3.4.7-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            ruby-${{ runner.os }}-3.4.7-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Restore Jekyll render cache
        uses: actions/cache@v4
        with:
          path: |
            _site
            .jekyll-cache
            .jekyll-metadata
            .sass-cache
          key: jekyll-render-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            jekyll-render-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install Ruby dependencies
        run: |
          gem install bundler -v 4.0.10
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Detect build scope
        id: build_scope
        env:
          BEFORE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          mode="full"
          reason="manual_dispatch"
          zero_sha="0000000000000000000000000000000000000000"

          if [[ "$EVENT_NAME" != "workflow_dispatch" && -n "${BEFORE:-}" && "$BEFORE" != "$zero_sha" ]] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "$BEFORE" "$HEAD")
            mapfile -t deleted_files < <(git diff --name-only --diff-filter=D "$BEFORE" "$HEAD")

            if (( ${#deleted_files[@]} > 0 )); then
              reason="deleted_file_requires_full_build"
            elif (( ${#changed_files[@]} == 0 )); then
              reason="no_changed_files_detected"
            else
              mode="incremental"
              reason="safe_incremental_paths"
              structural_pattern='^(_config\.yml|Gemfile|Gemfile\.lock|package(-lock)?\.json|tsconfig.*|404\.html|index\.html|_posts/|_layouts/|_includes/|_sass/|assets/css/|assets/jcem/css/|assets/jcem/js/|scripts/|\.github/workflows/)'
              safe_incremental_pattern='^(assets/(images|jcem/img)/|CNAME$|robots\.txt$|favicon\.)'

              for file in "${changed_files[@]}"; do
                if [[ "$file" =~ $structural_pattern ]]; then
                  mode="full"
                  reason="structural_change:${file}"
                  break
                fi

                if [[ "$file" =~ $safe_incremental_pattern ]]; then
                  continue
                fi

                mode="full"
                reason="unclassified_change:${file}"
                break
              done
            fi
          else
            reason="missing_diff_base"
          fi

          if [[ "$mode" == "incremental" && ! -f .jekyll-metadata ]]; then
            mode="full"
            reason="render_cache_missing"
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "build_mode=$mode reason=$reason"

      - name: Detect published posts
        id: posts
        run: |
          ruby scripts/collect_published_posts.rb \
            --diff-base "${{ github.event.before }}" \
            --diff-head "${{ github.sha }}" \
            --site-url "${{ steps.pages.outputs.base_url }}" \
            --out published-posts.json

      - name: Build Jekyll site
        run: |
          npm run build:ts
          if [ "${{ steps.build_scope.outputs.mode }}" = "incremental" ]; then
            bundle exec jekyll build --incremental --trace --baseurl=
          else
            rm -rf _site .jekyll-cache .jekyll-metadata .sass-cache
            bundle exec jekyll build --trace --baseurl=
          fi
        env:
          JEKYLL_ENV: production

      - name: Validate light and dark visuals
        run: npm run validate:visual

      - name: Verify root deployment paths
        run: |
          test -f _site/CNAME
          test "$(cat _site/CNAME)" = "www.jeancarloem.com"
          if grep -RInE '((href|src)=["'\'']\/blog\/|url\(["'\'']?\/blog\/)' _site; then
            echo "::error::O site foi gerado com caminhos sob /blog. O deploy deve ficar na raiz do dominio."
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Upload visual validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-validation
          path: visual-artifacts
          if-no-files-found: ignore

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: jekyll
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Validate published posts
        if: needs.jekyll.outputs.has_posts == 'true'
        env:
          POSTS_JSON: ${{ needs.jekyll.outputs.posts_json }}
        run: |
          printf '%s' "$POSTS_JSON" > published-posts.json
          jq -r '.[].url' published-posts.json | while IFS= read -r url; do
            curl --fail --silent --show-error --location --retry 6 --retry-delay 10 "$url" > /dev/null
          done

      - name: Start external distribution
        if: needs.jekyll.outputs.has_posts == 'true'
        uses: actions/github-script@v8
        env:
          POSTS_JSON: ${{ needs.jekyll.outputs.posts_json }}
        with:
          script: |
            const posts = JSON.parse(process.env.POSTS_JSON || '[]');
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'post_published',
              client_payload: {
                source_workflow: context.workflow,
                source_run_id: String(context.runId),
                posts
              }
            });
