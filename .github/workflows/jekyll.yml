name: Customizado Jekyll

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI_TOTAL_TIMEOUT_SECONDS: 600

on:
  push:
    branches:
      - main # O branch main contem o codigo-fonte do site.

  workflow_dispatch: # Permite execução manual (Actions > Run workflow)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  jekyll:
    if: github.ref == 'refs/heads/main' # Segurança extra
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has_posts: ${{ steps.posts.outputs.has_posts }}
      post_count: ${{ steps.posts.outputs.post_count }}
      posts_json: ${{ steps.posts.outputs.posts_json }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.7'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Cache Ruby dependencies
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ruby-${{ runner.os }}-3.4.7-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            ruby-${{ runner.os }}-3.4.7-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Ruby dependencies
        run: |
          ruby scripts/ci_timed_step.rb "Install Ruby dependencies" 120 -- bash -lc '
            gem install bundler -v 4.0.10
            bundle config set path vendor/bundle
            bundle install --jobs 4 --retry 3
          '

      - name: Install Node dependencies
        run: ruby scripts/ci_timed_step.rb "Install Node dependencies" 120 -- npm ci

      - name: Install Playwright browser
        run: ruby scripts/ci_timed_step.rb "Install Playwright browser" 180 -- npx playwright install chromium --with-deps

      - name: Detect build scope
        id: build_scope
        env:
          BEFORE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: ruby scripts/ci_timed_step.rb "Detect build scope" 30 -- ruby scripts/jekyll_build_scope.rb detect

      - name: Check committed _site cohesion
        id: committed_site
        env:
          HEAD: ${{ github.sha }}
        run: ruby scripts/ci_timed_step.rb "Check committed _site cohesion" 30 -- ruby scripts/jekyll_build_scope.rb local

      - name: Remove non-cohesive checkout render
        if: steps.build_scope.outputs.mode == 'incremental' && steps.committed_site.outputs.trusted != 'true'
        run: ruby scripts/ci_timed_step.rb "Remove non-cohesive checkout render" 30 -- rm -rf _site .jekyll-cache .jekyll-metadata .sass-cache

      - name: Restore Jekyll render cache
        id: render_cache
        if: steps.build_scope.outputs.mode == 'incremental' && steps.committed_site.outputs.trusted != 'true'
        uses: actions/cache@v4
        with:
          path: |
            _site
            .jekyll-cache
            .jekyll-metadata
            .sass-cache
          key: jekyll-render-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            jekyll-render-${{ runner.os }}-${{ github.ref_name }}-

      - name: Resolve _site cohesion
        id: cohesion
        env:
          TENTATIVE_MODE: ${{ steps.build_scope.outputs.mode }}
          TENTATIVE_REASON: ${{ steps.build_scope.outputs.reason }}
          BEFORE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}
        run: ruby scripts/ci_timed_step.rb "Resolve _site cohesion" 30 -- ruby scripts/jekyll_build_scope.rb resolve

      - name: Detect published posts
        id: posts
        run: |
          ruby scripts/ci_timed_step.rb "Detect published posts" 45 -- ruby scripts/collect_published_posts.rb \
              --diff-base "${{ github.event.before }}" \
              --diff-head "${{ github.sha }}" \
              --site-url "${{ steps.pages.outputs.base_url }}" \
              --out published-posts.json

      - name: Build Jekyll site
        if: steps.cohesion.outputs.mode != 'trusted_site'
        run: |
          ruby scripts/ci_timed_step.rb "Build Jekyll site" 240 -- bash -lc '
            npm run build:ts
            if [ "${{ steps.cohesion.outputs.mode }}" = "incremental" ]; then
              bundle exec jekyll build --incremental --trace --baseurl=
            else
              rm -rf _site .jekyll-cache .jekyll-metadata .sass-cache
              bundle exec jekyll build --trace --baseurl=
            fi
          '
        env:
          JEKYLL_ENV: production

      - name: Write _site cohesion manifest
        if: steps.cohesion.outputs.mode != 'trusted_site'
        env:
          SOURCE_SHA: ${{ github.sha }}
          BUILD_MODE: ${{ steps.cohesion.outputs.mode }}
          BUILD_REASON: ${{ steps.cohesion.outputs.reason }}
        run: ruby scripts/ci_timed_step.rb "Write _site cohesion manifest" 45 -- ruby scripts/jekyll_build_manifest.rb write

      - name: Validate light and dark visuals
        run: ruby scripts/ci_timed_step.rb "Validate light and dark visuals" 240 -- npm run validate:visual

      - name: Verify root deployment paths
        run: ruby scripts/ci_timed_step.rb "Verify root deployment paths" 30 -- ruby scripts/verify_root_deployment.rb

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Upload visual validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-validation
          path: visual-artifacts
          if-no-files-found: ignore

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: jekyll
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Validate published posts
        if: needs.jekyll.outputs.has_posts == 'true'
        env:
          POSTS_JSON: ${{ needs.jekyll.outputs.posts_json }}
        run: |
          printf '%s' "$POSTS_JSON" > published-posts.json
          jq -r '.[].url' published-posts.json | while IFS= read -r url; do
            curl --fail --silent --show-error --location --retry 6 --retry-delay 10 "$url" > /dev/null
          done

      - name: Start external distribution
        if: needs.jekyll.outputs.has_posts == 'true'
        uses: actions/github-script@v8
        env:
          POSTS_JSON: ${{ needs.jekyll.outputs.posts_json }}
        with:
          script: |
            const posts = JSON.parse(process.env.POSTS_JSON || '[]');
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'post_published',
              client_payload: {
                source_workflow: context.workflow,
                source_run_id: String(context.runId),
                posts
              }
            });
