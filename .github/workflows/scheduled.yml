name: scheduled

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUBLISH_BRANCH: gh-pages

on:
  schedule:
    - cron: '1 3 * * *' # 00:01 America/Sao_Paulo.
  workflow_dispatch:
    inputs:
      scheduled_date:
        description: 'Data alvo no formato YYYY-MM-DD'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scheduled:
    runs-on: ubuntu-latest
    outputs:
      has_posts: ${{ steps.posts.outputs.has_posts }}
      post_count: ${{ steps.posts.outputs.post_count }}
      posts_json: ${{ steps.posts.outputs.posts_json }}
      scheduled_date: ${{ steps.date.outputs.scheduled_date }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve scheduled date
        id: date
        run: |
          if [ -n "${{ inputs.scheduled_date }}" ]; then
            scheduled_date="${{ inputs.scheduled_date }}"
          else
            scheduled_date="$(TZ=America/Sao_Paulo date +%F)"
          fi
          echo "SCHEDULED_DATE=$scheduled_date" >> "$GITHUB_ENV"
          echo "scheduled_date=$scheduled_date" >> "$GITHUB_OUTPUT"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.7'

      - name: Prepare scheduled posts
        run: ruby scripts/prepare_scheduled_posts.rb --date "$SCHEDULED_DATE" --out .scheduled-posts.txt

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Detect scheduled publications
        id: posts
        run: |
          ruby scripts/collect_published_posts.rb \
            --files-file .scheduled-posts.txt \
            --site-url "${{ steps.pages.outputs.base_url }}" \
            --out published-posts.json

      - name: Stop when no posts are scheduled
        if: steps.posts.outputs.has_posts != 'true'
        run: echo "Nenhuma publicação agendada para $SCHEDULED_DATE."

      - name: Create scheduled publication branch
        if: steps.posts.outputs.has_posts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ruby scripts/publish.rb --branch "$PUBLISH_BRANCH"

      - name: Checkout scheduled publication branch
        if: steps.posts.outputs.has_posts == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_BRANCH }}
          fetch-depth: 0

      - name: Install Ruby dependencies
        if: steps.posts.outputs.has_posts == 'true'
        run: |
          gem install bundler -v 4.0.10
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Install Node dependencies
        if: steps.posts.outputs.has_posts == 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.posts.outputs.has_posts == 'true'
        run: npx playwright install chromium --with-deps

      - name: Build Jekyll site
        if: steps.posts.outputs.has_posts == 'true'
        run: |
          npm run build:ts
          bundle exec jekyll build --trace --baseurl=
        env:
          JEKYLL_ENV: production

      - name: Validate light and dark visuals
        if: steps.posts.outputs.has_posts == 'true'
        run: npm run validate:visual

      - name: Verify root deployment paths
        if: steps.posts.outputs.has_posts == 'true'
        run: |
          test -f _site/CNAME
          test "$(cat _site/CNAME)" = "www.jeancarloem.com"
          if grep -RInE '((href|src)=["'\'']\/blog\/|url\(["'\'']?\/blog\/)' _site; then
            echo "::error::O site foi gerado com caminhos sob /blog. O deploy deve ficar na raiz do dominio."
            exit 1
          fi

      - name: Upload build artifact
        if: steps.posts.outputs.has_posts == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Upload visual validation artifacts
        if: always() && steps.posts.outputs.has_posts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-visual-validation
          path: visual-artifacts
          if-no-files-found: ignore

  deploy:
    if: needs.scheduled.outputs.has_posts == 'true'
    runs-on: ubuntu-latest
    needs: scheduled
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Validate scheduled posts
        env:
          POSTS_JSON: ${{ needs.scheduled.outputs.posts_json }}
        run: |
          printf '%s' "$POSTS_JSON" > published-posts.json
          jq -r '.[].url' published-posts.json | while IFS= read -r url; do
            curl --fail --silent --show-error --location --retry 6 --retry-delay 10 "$url" > /dev/null
          done

      - name: Delete scheduled publication branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: gh-pages
        run: |
          set -euo pipefail
          git init cleanup
          cd cleanup
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin --delete "$PUBLISH_BRANCH" || true

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Ruby for migration
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.7'

      - name: Persist scheduled migration
        run: |
          ruby scripts/prepare_scheduled_posts.rb \
            --date "${{ needs.scheduled.outputs.scheduled_date }}" \
            --mode move \
            --out .scheduled-posts.txt
          if [ -z "$(git status --porcelain)" ]; then
            echo "Nenhuma migração pendente."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts _scheduled
          git commit -m "Publica posts agendados de ${{ needs.scheduled.outputs.scheduled_date }} [skip ci]"
          git push

      - name: Start external distribution
        uses: actions/github-script@v8
        env:
          POSTS_JSON: ${{ needs.scheduled.outputs.posts_json }}
        with:
          script: |
            const posts = JSON.parse(process.env.POSTS_JSON || '[]');
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'post_published',
              client_payload: {
                source_workflow: context.workflow,
                source_run_id: String(context.runId),
                posts
              }
            });
