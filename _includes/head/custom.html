<style>
	@keyframes carregandoPagina {
		0%,
		10%,
		100% {
			width: 5em;
			height: 5em;
		}
		65% {
			width: 10em;
			height: 10em;
		}
	}

	@keyframes loaderBlock {
		0%,
		30% {
			transform: rotate(0);
		}
		55% {
			background-color: rgba(0, 0, 70, 0.9);
		}
		100% {
			transform: rotate(90deg);
		}
	}

	@keyframes loaderBlockInverse {
		0%,
		20% {
			transform: rotate(0);
		}
		55% {
			background-color: rgba(0, 0, 70, 0.9);
		}
		100% {
			transform: rotate(-90deg);
		}
	}

	html:not(.jcem-page-loaded) body {
		/* PROTECAO: a pagina real so aparece depois de window.load. */
		overflow: hidden;
	}

	html:not(.jcem-page-loaded) body > :not(.carregandoPagina) {
		visibility: hidden !important;
	}

	body > .carregandoPagina {
		position: fixed;
		inset: 0;
		z-index: 2147483600;
		pointer-events: none;
		transition:
			opacity 0.22s ease,
			visibility 0.22s ease;
	}

	body > .carregandoPagina .jcem-load-progress {
		--jcem-load-progress: 8%;
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 0.5rem;
		overflow: hidden;
		background: rgba(17, 17, 17, 0.24);
		box-shadow: 0 0.18rem 0.55rem rgba(0, 0, 0, 0.22);
	}

	body > .carregandoPagina .jcem-load-progress > span {
		position: absolute;
		top: 0;
		left: 0;
		display: block;
		width: var(--jcem-load-progress);
		height: 100%;
		background: linear-gradient(90deg, #2b92db, #f4d400);
		box-shadow: 0 0 0.65rem rgba(244, 212, 0, 0.32);
		transition: width 0.18s ease;
	}

	body > .carregandoPagina .carregandoPagina__mark {
		position: fixed;
		top: 50%;
		left: 50%;
		width: 6rem;
		height: 6rem;
		transform: translate(-50%, -50%) rotate(45deg) translate3d(0, 0, 0);
		animation: carregandoPagina 1.2s infinite ease-in-out;
	}

	html:not(.jcem-page-loaded) body > .carregandoPagina,
	html:not(.jcem-page-loaded) body > .carregandoPagina * {
		visibility: visible !important;
	}

	html.jcem-page-loaded body > .carregandoPagina {
		visibility: hidden;
		opacity: 0;
	}

	body > .carregandoPagina .carregandoPagina__mark span {
		position: absolute;
		display: block;
		width: 2.7rem;
		height: 2.7rem;
		background-color: #2b92db;
		animation: loaderBlock 1.2s infinite ease-in-out both;
	}

	body > .carregandoPagina .carregandoPagina__mark span:nth-child(1) {
		top: 0;
		left: 0;
	}

	body > .carregandoPagina .carregandoPagina__mark span:nth-child(2) {
		top: 0;
		right: 0;
		animation: loaderBlockInverse 1.2s infinite ease-in-out both;
	}

	body > .carregandoPagina .carregandoPagina__mark span:nth-child(3) {
		bottom: 0;
		left: 0;
		animation: loaderBlockInverse 1.2s infinite ease-in-out both;
	}

	body > .carregandoPagina .carregandoPagina__mark span:nth-child(4) {
		right: 0;
		bottom: 0;
	}
</style>
