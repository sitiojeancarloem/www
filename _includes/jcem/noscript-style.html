<style>
	body > .main_jcem_wrapper,
	body > .loader-bar,
	body > .carregandoPagina {
		/* PROTECAO: sem JavaScript, somente o shell noscript deve aparecer. */
		display: none !important;
	}

	body > noscript {
		position: fixed;
		inset: 0;
		z-index: 2147483647;
		display: block;
		width: 100vw;
		height: 100vh;
		overflow-x: hidden;
		overflow-y: auto;
		background: var(--dark--bg);
		background-color: var(--dark--bg-solid);
	}

	body > noscript,
	body > noscript * {
		visibility: visible !important;
		box-sizing: border-box;
	}

	body > noscript .jcem-noscript-page {
		--tblb: var(--dark--tblb);
		--bg: var(--dark--bg);
		--bg-solid: var(--dark--bg-solid);
		--tc: var(--dark--tc);
		--mtc: var(--dark--mtc);
		--pri: var(--dark--pri);
		--bc: var(--dark--bc);
		--cbg: var(--dark--cbg);
		--cbgd: var(--dark--cbgd);
		--fbg: var(--dark--fbg);
		--ftbg: var(--dark--ftbg);
		--foc: var(--dark--foc);
		--act: var(--dark--act);
		--link: var(--dark--link);
		--link-h: var(--dark--link-h);
		--link-v: var(--dark--link-v);
		--mlink: var(--dark--mlink);
		--mlink-h: var(--dark--mlink-h);
		--nav-h: var(--dark--nav-h);
		--jcem-panel-bg: var(--dark--jcem-panel-bg);
		--jcem-panel-title-bg: var(--dark--jcem-panel-title-bg);
		--jcem-panel-border: var(--dark--jcem-panel-border);
		--jcem-panel-shadow: var(--dark--jcem-panel-shadow);
		--jcem-panel-accent-hot: var(--dark--jcem-panel-accent-hot);
		--jcem-rule-color: var(--dark--jcem-rule-color);
		--jcem-rule-shadow: var(--dark--jcem-rule-shadow);
		--jcem-masthead-shadow: rgba(0, 0, 0, 0.22);
		min-height: 100vh;
		background: var(--bg);
		background-color: var(--bg-solid);
		background-repeat: no-repeat;
		background-size: cover;
		color: var(--tc);
	}

	body > noscript .jcem-theme-toggle,
	body > noscript .search__toggle,
	body > noscript .greedy-nav__toggle,
	body > noscript .hidden-links {
		display: none !important;
	}

	body > noscript .jcem-noscript-masthead {
		position: sticky;
		top: 0;
		z-index: 10;
	}

	body > noscript .jcem-noscript-featured {
		width: 100vw;
		max-width: 100vw;
		height: clamp(12rem, 32vh, 24rem);
		margin: 0 0 0 calc(50% - 50vw);
		overflow: hidden;
		background: #010203;
		box-shadow: 0 0.15rem 0 var(--jcem-rule-shadow);
	}

	body > noscript .jcem-noscript-featured .jcem-featured-image__img {
		display: block;
		width: 100%;
		height: 100%;
		margin: 0 auto;
		object-fit: contain;
		object-position: center;
		background: #010203;
	}

	body > noscript .jcem-noscript-content {
		width: min(100% - 2rem, 42rem);
		margin: 0 auto;
		padding: clamp(1rem, 3vw, 2rem) 0;
	}

	body > noscript .jcem-noscript__panel {
		padding: clamp(1rem, 2.4vw, 1.55rem);
		border: 1px solid var(--jcem-panel-border);
		border-radius: 0.4rem;
		background: color-mix(
			in srgb,
			var(--jcem-panel-bg) 88%,
			transparent
		);
		box-shadow: 0 0 1rem var(--jcem-panel-shadow);
	}

	body > noscript .jcem-noscript__panel h1 {
		margin: 0 0 0.85rem;
		padding-bottom: 0.5rem;
		border-bottom: 1px solid var(--jcem-rule-color);
		color: var(--jcem-panel-accent-hot);
		font-size: clamp(1.25rem, 3.4vw, 1.75rem);
		line-height: 1.1;
	}

	body > noscript .jcem-noscript__lang {
		margin-top: 0.75rem;
		padding-top: 0.75rem;
		border-top: 1px solid
			color-mix(in srgb, var(--jcem-panel-border) 62%, transparent);
	}

	body > noscript .jcem-noscript__lang:first-of-type {
		border-top: 0;
	}

	body > noscript .jcem-noscript__lang h2 {
		margin: 0 0 0.25rem;
		color: var(--link);
		font-size: 0.92rem;
		line-height: 1.2;
	}

	body > noscript .jcem-noscript__lang p {
		margin: 0;
		color: var(--tc);
		font-size: 0.92rem;
		line-height: 1.42;
	}

	body > noscript .jcem-noscript__lang strong {
		color: var(--tc);
		font-style: normal;
	}

	body > noscript .jcem-noscript-footer {
		margin-top: 0;
	}

	@supports not (
		background: color-mix(in srgb, #000 50%, transparent)
	) {
		body > noscript .jcem-noscript__panel {
			background: var(--jcem-panel-bg);
		}
	}
</style>
